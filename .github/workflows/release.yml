name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build Linux amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X obdurate/internal/cli.Version=${{ steps.version.outputs.tag }}" \
            -o dist/obd-linux-amd64 \
            ./cmd/obd

      - name: Build Windows amd64
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X obdurate/internal/cli.Version=${{ steps.version.outputs.tag }}" \
            -o dist/obd-windows-amd64.exe \
            ./cmd/obd

      - name: Checksums
        working-directory: dist
        run: |
          sha256sum obd-linux-amd64 obd-windows-amd64.exe > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/obd-linux-amd64
            dist/obd-windows-amd64.exe
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
